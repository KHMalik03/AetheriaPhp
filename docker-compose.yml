services:
  frontend:
    build: .
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      - API_URL=http://backend/api
    depends_on:
      - backend
    volumes:
      - ./:/var/www/html
      - php-sessions:/var/lib/php/sessions

  backend:
    build: .
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./:/var/www/html
      - php-sessions:/var/lib/php/sessions

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql

volumes:
  db-data:
  php-sessions:
